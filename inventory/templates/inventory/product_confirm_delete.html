{% extends 'inventory/base.html' %}

{% block page_title %}Excluir Produto{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-white rounded-lg shadow-lg p-8 border-l-4 border-red-600">
        <div class="text-center mb-6">
            <i class="fas fa-exclamation-triangle text-red-600 text-6xl"></i>
        </div>
        
        <h1 class="text-2xl font-bold text-gray-800 text-center mb-4">Excluir Produto</h1>
        <p class="text-gray-600 text-center mb-6">
            Tem certeza que deseja excluir <strong class="text-gray-800">{{ object.name }}</strong>? 
            <br><br>
            <span class="text-red-600 font-semibold">Esta ação não pode ser desfeita.</span>
        </p>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <button type="submit" class="w-full bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700 transition font-semibold flex items-center justify-center gap-2">
                <i class="fas fa-trash"></i> Excluir Permanentemente
            </button>
            <a href="{% url 'product_detail' object.pk %}" class="block w-full bg-gray-300 text-gray-800 px-6 py-3 rounded-lg hover:bg-gray-400 transition font-semibold text-center">
                <i class="fas fa-times"></i> Cancelar
            </a>
        </form>
    </div>
</div>
{% endblock %}
